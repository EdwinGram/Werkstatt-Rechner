<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edwins Werkstatt-Rechner</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #e4e4e4;
}

header {
    background: #2b2b2b;
    color: white;
    padding: 15px;
    text-align: center;
    font-size: 20px;
    letter-spacing: 1px;
}

nav {
    display: flex;
    justify-content: space-around;
    background: #444;
}

nav button {
    flex: 1;
    padding: 12px;
    background: #444;
    color: white;
    border: none;
    font-size: 14px;
}

nav button:hover {
    background: #6b4f2a;
}

.section {
    display: none;
    padding: 20px;
}

.active {
    display: block;
}

.card {
    background: white;
    padding: 20px;
    border-radius: 8px;
    margin: 20px auto;
    max-width: 500px;
    box-shadow: 0 3px 8px rgba(0,0,0,0.15);
}

input, select {
    width: 100%;
    padding: 8px;
    margin-top: 5px;
    margin-bottom: 10px;
}

button.calc {
    width: 100%;
    padding: 10px;
    background: #6b4f2a;
    color: white;
    border: none;
    border-radius: 6px;
}

.result {
    font-weight: bold;
    margin-top: 10px;
}

table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
}

th, td {
    border: 1px solid #ccc;
    padding: 4px;
    text-align: center;
}

th {
    background: #ddd;
}

/* ===== Units Layout ===== */

.unit-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 15px;
}

.unit-row input {
    flex: 1;
}

.unit-row span {
    min-width: 40px;
}

.unit-row .calc {
    width: 70px;
    height: 40px;
    font-size: 18px;
    font-weight: bold;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
}
</style>
</head>

<body>

<header>🧰 Edwins Werkstatt-Rechner</header>

<nav>
<button onclick="showSection('holz')">🌲 Holzpreis</button>
<button onclick="showSection('awg')">🔌 AWG</button>
<button onclick="showSection('units')">📏 Umrechnung</button>
</nav>

<!-- ================= HOLZ ================= -->
<div id="holz" class="section active">
  <div class="card">
    <h3>Holzpreis</h3>

    <input type="number" id="d" placeholder="Dicke (Zoll)">
    <input type="number" id="b" placeholder="Breite (Zoll)">
    <input type="number" id="l" placeholder="Länge (Fuß)">
    <input type="number" id="preis" placeholder="Preis pro bf">

    <button type="button" class="calc" onclick="calcHolz()">Berechnen</button>
    <button type="reset" class="calc" style="background:#999;">Reset</button>

    <div id="holzResult" class="result"></div>
  </div>
</div>



<!-- ================= AWG ================= -->
<div id="awg" class="section">
  <div class="card">
    <h3>AWG ↔ mm²</h3>

    <input type="number" id="awgInput" placeholder="AWG">
    <button type="button" class="calc" onclick="awgToMM()">AWG → mm²</button>

    <input type="number" id="mmInput" placeholder="mm²">
    <button type="button" class="calc" onclick="mmToAWG()">mm² → AWG</button>

    <div id="awgResult" class="result"></div>
  </div>

  <div class="card">
    <h3>Typische AWG-Werte</h3>
    <table>
      <tr><th>AWG</th><th>mm²</th></tr>
      <tr><td>0</td><td>53.48</td></tr>
      <tr><td>4</td><td>21.15</td></tr>
      <tr><td>6</td><td>13.30</td></tr>
      <tr><td>10</td><td>5.26</td></tr>
      <tr><td>12</td><td>3.31</td></tr>
      <tr><td>14</td><td>2.08</td></tr>
      <tr><td>16</td><td>1.31</td></tr>
      <tr><td>18</td><td>0.82</td></tr>
      <tr><td>20</td><td>0.52</td></tr>
    </table>
  </div>
</div>



<!-- ================= UNITS ================= -->
<div id="units" class="section">
  <div class="card">
    <h3>Längen & Gewicht</h3>

    <!-- Inch ↔ cm -->
    <div class="unit-row">
      <input type="number" id="inch" placeholder="Wert">
      <span>inch</span>

      <button type="button" class="calc" onclick="convertInchCM()">⇄</button>

      <input type="number" id="cm" placeholder="Wert">
      <span>cm</span>
    </div>

    <!-- Feet ↔ Meter -->
    <div class="unit-row">
      <input type="number" id="feet" placeholder="Wert">
      <span>ft</span>

      <button type="button" class="calc" onclick="convertFeetMeter()">⇄</button>

      <input type="number" id="meter" placeholder="Wert">
      <span>m</span>
    </div>

    <!-- kg ↔ lbs -->
    <div class="unit-row">
      <input type="number" id="kg" placeholder="Wert">
      <span>kg</span>

      <button type="button" class="calc" onclick="convertKgLb()">⇄</button>

      <input type="number" id="lb" placeholder="Wert">
      <span>lbs</span>
    </div>

  </div>
</div>

<script>

// ---------- Navigation ----------
function showSection(id){
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

function round2(x){
    return Number(x || 0).toFixed(2);
}

// ---------- HOLZ ----------
function calcHolz(){
    let dicke = parseFloat(document.getElementById("d").value);
    let breite = parseFloat(document.getElementById("b").value);
    let laenge = parseFloat(document.getElementById("l").value);
    let preisProBf = parseFloat(document.getElementById("preis").value);

    if(isNaN(dicke) || isNaN(breite) || isNaN(laenge) || isNaN(preisProBf)){
        document.getElementById("holzResult").innerHTML = "Bitte alle Werte eingeben.";
        return;
    }

    let bf = (dicke * breite * laenge) / 12;
    let total = bf * preisProBf;

    document.getElementById("holzResult").innerHTML =
        "Menge: " + round2(bf) + " bf<br>" +
        "Gesamtpreis: ₱ " + round2(total);
}


// Enter-Logik im Holzmodul (Springen + Berechnen im letzten Feld)
document.querySelectorAll("#holz input").forEach((input, index, inputs) => {
    input.addEventListener("keydown", function(e){
        if(e.key === "Enter"){
            e.preventDefault();

            if(index < inputs.length - 1){
                inputs[index + 1].focus();
            } else {
                calcHolz();
            }
        }
    });
});


// ---------- AWG ----------
function awgToMM(){
    let awg = parseFloat(document.getElementById("awgInput").value);
    if(isNaN(awg)) return;

    let mm = 0.012668 * Math.pow(92, (36 - awg) / 19.5);

    document.getElementById("awgResult").innerHTML =
        round2(mm) + " mm²";
}

function mmToAWG(){
    let mm = parseFloat(document.getElementById("mmInput").value);
    if(isNaN(mm)) return;

    let awg = 36 - (19.5 * Math.log(mm / 0.012668) / Math.log(92));

    document.getElementById("awgResult").innerHTML =
        round2(awg) + " AWG";
}


// ================= UNITS =================

let inchField = document.getElementById("inch");
let cmField = document.getElementById("cm");

let feetField = document.getElementById("feet");
let meterField = document.getElementById("meter");

let kgField = document.getElementById("kg");
let lbField = document.getElementById("lb");


// ---------- Feld beim Anklicken leeren ----------

inchField.addEventListener("focus", function(){
    inchField.value = "";
});

cmField.addEventListener("focus", function(){
    cmField.value = "";
});

feetField.addEventListener("focus", function(){
    feetField.value = "";
});

meterField.addEventListener("focus", function(){
    meterField.value = "";
});

kgField.addEventListener("focus", function(){
    kgField.value = "";
});

lbField.addEventListener("focus", function(){
    lbField.value = "";
});


// ---------- Umrechnung ----------

function convertInchCM(){
    let inchVal = parseFloat(inchField.value);
    let cmVal = parseFloat(cmField.value);

    if(!isNaN(inchVal)){
        cmField.value = round2(inchVal * 2.54);
    }
    else if(!isNaN(cmVal)){
        inchField.value = round2(cmVal / 2.54);
    }
}

function convertFeetMeter(){
    let feetVal = parseFloat(feetField.value);
    let meterVal = parseFloat(meterField.value);

    if(!isNaN(feetVal)){
        meterField.value = round2(feetVal * 0.3048);
    }
    else if(!isNaN(meterVal)){
        feetField.value = round2(meterVal / 0.3048);
    }
}

function convertKgLb(){
    let kgVal = parseFloat(kgField.value);
    let lbVal = parseFloat(lbField.value);

    if(!isNaN(kgVal)){
        lbField.value = round2(kgVal * 2.20462);
    }
    else if(!isNaN(lbVal)){
        kgField.value = round2(lbVal / 2.20462);
    }
}
</script>

</body>
</html>
