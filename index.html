<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edwins Werkstatt-Rechner</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #e4e4e4;
}

header {
    background: #2b2b2b;
    color: white;
    padding: 15px;
    text-align: center;
    font-size: 20px;
    letter-spacing: 1px;
}

nav {
    display: flex;
    justify-content: space-around;
    background: #444;
}

nav button {
    flex: 1;
    padding: 12px;
    background: #444;
    color: white;
    border: none;
    font-size: 14px;
}

nav button:hover {
    background: #6b4f2a;
}

.section {
    display: none;
    padding: 20px;
}

.active {
    display: block;
}

.card {
    background: white;
    padding: 20px;
    border-radius: 8px;
    margin: 20px auto;
    max-width: 500px;
    box-shadow: 0 3px 8px rgba(0,0,0,0.15);
}

input, select {
    width: 100%;
    padding: 8px;
    margin-top: 5px;
    margin-bottom: 10px;
}

button.calc {
    width: 100%;
    padding: 10px;
    background: #6b4f2a;
    color: white;
    border: none;
    border-radius: 6px;
}

.result {
    font-weight: bold;
    margin-top: 10px;
}

table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
}

th, td {
    border: 1px solid #ccc;
    padding: 4px;
    text-align: center;
}

th {
    background: #ddd;
}
</style>
</head>

<body>

<header>🧰 Edwins Werkstatt-Rechner</header>

<nav>
<button onclick="showSection('holz')">🌲 Holzpreis</button>
<button onclick="showSection('awg')">🔌 AWG</button>
<button onclick="showSection('units')">📏 Umrechnung</button>
</nav>

<!-- HOLZ -->
<div id="holz" class="section active">
<div class="card">
<h3>Holzpreis</h3>

<form onsubmit="calcHolz(); return false;" onreset="holzResult.innerHTML=''">

<input type="number" id="d" placeholder="Dicke (Zoll)"required>
<input type="number" id="b" placeholder="Breite (Zoll)"required>
<input type="number" id="l" placeholder="Länge (Fuß)"required>
<input type="number" id="preis" placeholder="Preis pro bf"required>

<button type="submit" class="calc">Berechnen</button>
<button type="reset" class="calc" style="background:#999;">Reset</button>

</form>

<div id="holzResult" class="result"></div>
</div>
</div>

<!-- AWG -->
<div id="awg" class="section">
<div class="card">
<h3>AWG ↔ mm²</h3>

<form onsubmit="awgToMM(); return false;" onreset="awgResult.innerHTML=''">

<input type="number" id="awgInput" placeholder="AWG">
<button type="submit" class="calc">AWG → mm²</button>

<input type="number" id="mmInput" placeholder="mm²">
<button type="button" class="calc" onclick="mmToAWG()">mm² → AWG</button>

<button type="reset" class="calc" style="background:#999;">Reset</button>

</form>

<div id="awgResult" class="result"></div>
</div>

<div class="card">
<h3>Typische AWG-Werte</h3>
<table>
<tr><th>AWG</th><th>mm²</th></tr>
<tr><td>0</td><td>53.48</td></tr>
<tr><td>4</td><td>21.15</td></tr>
<tr><td>6</td><td>13.30</td></tr>
<tr><td>10</td><td>5.26</td></tr>
<tr><td>12</td><td>3.31</td></tr>
<tr><td>14</td><td>2.08</td></tr>
<tr><td>16</td><td>1.31</td></tr>
<tr><td>18</td><td>0.82</td></tr>
<tr><td>20</td><td>0.52</td></tr>
</table>
</div>
</div>

<!-- UNITS -->
<div id="units" class="section">
<div class="card">
<h3>Längen & Gewicht</h3>
<form onreset="unitResult.innerHTML=''">
<input type="number" id="inch" placeholder="Inch">
<button class="calc" onclick="inchToCM()">Inch → cm</button>

<input type="number" id="cm" placeholder="cm">
<button class="calc" onclick="cmToInch()">cm → Inch</button>

<input type="number" id="feet" placeholder="Feet">
<button class="calc" onclick="feetToM()">Feet → Meter</button>

<input type="number" id="meter" placeholder="Meter">
<button class="calc" onclick="mToFeet()">Meter → Feet</button>

<input type="number" id="kg" placeholder="kg">
<button class="calc" onclick="kgToLb()">kg → lbs</button>

<input type="number" id="lb" placeholder="lbs">
<button class="calc" onclick="lbToKg()">lbs → kg</button>

<div id="unitResult" class="result"></div>
<button type="reset" class="calc" style="background:#999;">Reset</button>
</form>
</div>
</div>

<script>
function showSection(id){
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

function round2(x){ return Number(x).toFixed(2); }

// Holz
function calcHolz(){
    let dicke = parseFloat(document.getElementById("d").value);
    let breite = parseFloat(document.getElementById("b").value);
    let laenge = parseFloat(document.getElementById("l").value);
    let preisProBf = parseFloat(document.getElementById("preis").value);

    if(isNaN(dicke)||isNaN(breite)||isNaN(laenge)||isNaN(preisProBf)){
        document.getElementById("holzResult").innerHTML = "Bitte alle Werte eingeben.";
        return;
    }

    let bf = (dicke * breite * laenge) / 12;
    let total = bf * preisProBf;

    document.getElementById("holzResult").innerHTML =
    "Menge: " + round2(bf) + " bf<br>" +
    "Gesamtpreis: ₱ " + round2(total);
}

// AWG
function awgToMM(){
    let awg = parseFloat(awgInput.value);
    if(isNaN(awg)) return;
    let mm = 0.012668 * Math.pow(92, (36-awg)/19.5);
    awgResult.innerHTML = round2(mm)+" mm²";
}

function mmToAWG(){
    let mm = parseFloat(mmInput.value);
    if(isNaN(mm)) return;
    let awg = 36 - (19.5*Math.log(mm/0.012668)/Math.log(92));
    awgResult.innerHTML = round2(awg)+" AWG";
}

// Units
function inchToCM(){ unitResult.innerHTML = round2(inch.value*2.54)+" cm"; }
function cmToInch(){ unitResult.innerHTML = round2(cm.value/2.54)+" inch"; }
function feetToM(){ unitResult.innerHTML = round2(feet.value*0.3048)+" m"; }
function mToFeet(){ unitResult.innerHTML = round2(meter.value/0.3048)+" ft"; }
function kgToLb(){ unitResult.innerHTML = round2(kg.value*2.20462)+" lbs"; }
function lbToKg(){ unitResult.innerHTML = round2(lb.value/2.20462)+" kg"; }
document.querySelectorAll("#holz input").forEach(input => {
    input.addEventListener("keydown", function(e){
        if(e.key === "Enter"){
            e.preventDefault();
            calcHolz();
        }
    });
});
</script>

</body>
</html>
